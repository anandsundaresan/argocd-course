apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-dashboard
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://registry-1.docker.io/k8s-dashboard
    chart: kubernetes-dashboard
    targetRevision: 7.13.0

  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard